<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Little Camera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="loading-overlay" role="status" aria-live="polite">
      <div class="loading-overlay__inner">
        <img
          id="loading-animation"
          src="PNG_Sequence/Kodak_Charmera-00001.png"
          alt=""
          decoding="async"
        />
        <p class="loading-overlay__caption">loading...</p>
      </div>
    </div>

    <div id="canvas">
      <div id="world"></div>
    </div>

    <div id="vignette"></div>
    <div id="ui-label">
      <div class="ui-label__token-pill">
        <img
          class="ui-label__token"
          src="PNG_Sequence/Kodak_Charmera-00001.png"
          alt=""
          aria-hidden="true"
          decoding="async"
        />
      </div>
      <div class="ui-label__text-pill">
        <span class="ui-label__text">Little Camera</span>
      </div>
    </div>
    <div id="metadata-dock" class="metadata-dock--hidden" aria-hidden="true">
      <span class="metadata-dock__title"></span>
      <span class="metadata-dock__date"></span>
    </div>
    <button
      id="debug-toggle"
      type="button"
      aria-controls="debug-panel"
      aria-expanded="true"
    >
      Tune
    </button>
    <aside id="debug-panel" aria-label="Debug tuning panel"></aside>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
